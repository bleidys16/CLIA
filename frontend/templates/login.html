{% extends 'base.html' %}

{% block title %}Iniciar Sesión | VITA Clinical{% endblock %}

{% block login_content %}
<div class="d-flex align-items-center justify-content-center" style="min-height: 100vh; background-color: var(--clia-bright-gray);">
    <div class="card p-4 shadow-lg border-0" style="width: 100%; max-width: 420px; border-radius: 16px; background-color: #ffffff;">
        <div class="text-center mb-4">
            <div class="d-inline-flex align-items-center justify-content-center rounded-circle mb-3" 
                 style="width: 65px; height: 65px; background-color: var(--clia-jacarta);">
                <i class="fa-solid fa-heart-pulse fs-2" style="color: var(--clia-wisteria);"></i>
            </div>
            <h2 class="fw-bold" style="font-family: 'Epilogue', sans-serif; color: var(--clia-jacarta); margin: 0;">VITA Clinical</h2>
            <p class="text-muted small mt-1">Plataforma de Analítica Clínica Inteligente</p>
        </div>

        <div id="login-alert" class="alert alert-danger d-none py-2 text-center" style="font-size: 0.9rem;">
            <i class="fa-solid fa-circle-xmark me-2"></i> Credenciales inválidas.
        </div>

        <form id="form-login">
            <div class="mb-3">
                <label for="username" class="form-label small fw-semibold" style="color: var(--clia-jacarta);">Correo Electrónico / Usuario</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-envelope text-muted"></i></span>
                    <input type="text" class="form-control bg-light border-start-0 ps-0" id="username" required placeholder="ejemplo@vita.com">
                </div>
            </div>

            <div class="mb-4">
                <label for="password" class="form-label small fw-semibold" style="color: var(--clia-jacarta);">Contraseña</label>
                <div class="input-group">
                    <span class="input-group-text bg-light border-end-0"><i class="fa-solid fa-lock text-muted"></i></span>
                    <input type="password" class="form-control bg-light border-start-0 ps-0" id="password" required placeholder="••••••••">
                    <button class="input-group-text bg-light border-start-0" type="button" id="toggle-password" style="cursor: pointer;">
                        <i class="fa-solid fa-eye text-muted" id="password-icon"></i>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-clia-primary w-100 py-3 shadow-sm" id="btn-login-submit" style="font-weight: 600;">
                <i class="fa-solid fa-right-to-bracket me-2"></i> Iniciar Sesión
            </button>
        </form>
    </div>
</div>

<script>
    document.getElementById('toggle-password').addEventListener('click', function() {
        const input = document.getElementById('password');
        const icon = document.getElementById('password-icon');
        if (input.type === 'password') {
            input.type = 'text';
            icon.classList.remove('fa-eye');
            icon.classList.add('fa-eye-slash');
        } else {
            input.type = 'password';
            icon.classList.remove('fa-eye-slash');
            icon.classList.add('fa-eye');
        }
    });

    document.getElementById('form-login').addEventListener('submit', async function(e) {
        e.preventDefault();

        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const alertBox = document.getElementById('login-alert');
        const btnSubmit = document.getElementById('btn-login-submit');

        alertBox.classList.add('d-none');
        btnSubmit.disabled = true;
        btnSubmit.innerHTML = `<i class="fa-solid fa-circle-notch fa-spin me-2"></i> Autenticando...`;

        try {
            const response = await fetch('/api/auth/login/', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username: username, password: password })
            });

            const data = await response.json();

            if (response.ok) {
                localStorage.setItem('token_acceso', data.access);
                localStorage.setItem('token_refresco', data.refresh);
                window.location.href = '/dashboard/';
            } else {
                alertBox.classList.remove('d-none');
            }
        } catch (error) {
            console.error("Error en comunicación con auth server:", error);
            alertBox.classList.remove('d-none');
        } finally {
            btnSubmit.disabled = false;
            btnSubmit.innerHTML = `<i class="fa-solid fa-right-to-bracket me-2"></i> Iniciar Sesión`;
        }
    });
</script>
{% endblock %}
