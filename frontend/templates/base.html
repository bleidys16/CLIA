<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}VITA Clinical{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;600;700;800&family=Urbanist:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/apexcharts"></script>

    <style>
        :root {
            --clia-jacarta: #3F2A52;
            --clia-dark-blue-gray: #75619D;
            --clia-wisteria: #BEAEDB;
            --clia-bright-gray: #E6EFF7;
            --clia-black-coffee: #3A2D34;
        }
        body {
            font-family: 'Urbanist', sans-serif;
            background-color: var(--clia-bright-gray);
            color: var(--clia-black-coffee);
            margin: 0;
            padding: 0;
        }
        h1, h2, h3, h4, h5, h6 { font-family: 'Epilogue', sans-serif; }
        .sidebar-vita {
            background-color: var(--clia-jacarta);
            min-height: 100vh;
            color: #fff;
        }
        .nav-link-vita {
            color: rgba(255,255,255,0.7);
            transition: all 0.2s;
            border-radius: 6px;
        }
        .nav-link-vita:hover, .nav-link-vita.active {
            color: #fff;
            background-color: rgba(255,255,255,0.1);
        }
        .btn-clia-primary {
            background-color: var(--clia-wisteria);
            color: var(--clia-black-coffee);
            font-weight: 700;
            border: none;
            border-radius: 12px;
        }
        .btn-clia-primary:hover {
            opacity: 0.9;
        }
        .btn-clia-refresh {
            background-color: var(--clia-wisteria);
            color: var(--clia-black-coffee);
            font-weight: 700;
            border: none;
            padding: 0.6rem 1.5rem;
            border-radius: 12px;
            transition: opacity 0.1s;
        }
        .btn-clia-refresh:hover { opacity: 0.9; }
        .kpi-card-original {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 1.25rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 105px;
        }
        .kpi-card-original.critico { border-left: 5px solid #dc3545; }
        .kpi-card-original.hiper { border-left: 5px solid #ffc107; }
        .kpi-card-original.diab { border-left: 5px solid #0dcaf0; }
        .kpi-card-original.fuma { border-left: 5px solid #6c757d; }
        .kpi-info-box .kpi-title {
            font-size: 0.85rem;
            font-weight: 700;
            text-transform: uppercase;
            color: #6C757D;
            margin-bottom: 0.25rem;
        }
        .kpi-info-box .kpi-number {
            font-size: 2.5rem;
            font-weight: 800;
            color: var(--clia-black-coffee);
            line-height: 1;
        }
        .kpi-icon-box { font-size: 2rem; opacity: 0.8; }
        .chart-box-original {
            background-color: #ffffff;
            border-radius: 16px;
            padding: 1.5rem;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

    <script>
        (function() {
            const token = localStorage.getItem('token_acceso');
            const esPaginaLogin = window.location.pathname.includes('/login/');

            if (!token && !esPaginaLogin) {
                window.location.href = '/login/';
            } else if (token && esPaginaLogin) {
                window.location.href = '/dashboard/';
            }
        })();
    </script>

    {% if request.resolver_match.url_name == 'login' %}
        {% block login_content %}{% endblock %}
    {% else %}
        <div class="container-fluid">
            <div class="row">
                <div class="col-12 col-md-3 col-lg-2 sidebar-vita p-3 d-flex flex-column justify-content-between">
                    <div>
                        <div class="d-flex align-items-center gap-2 mb-4 px-2">
                            <i class="fa-solid fa-heart-pulse fs-3" style="color: var(--clia-wisteria);"></i>
                            <span class="fw-bold fs-4 m-0" style="font-family: 'Epilogue'; letter-spacing: -0.5px;">VITA</span>
                        </div>

                        <ul class="nav flex-column gap-2">
                            <li class="nav-item">
                                <a class="nav-link nav-link-vita" id="nav-dashboard" href="/dashboard/">
                                    <i class="fa-solid fa-chart-pie me-2"></i> Dashboard
                                </a>
                            </li>
                            <li class="nav-item d-none" id="menu-cargar-dataset">
                                <a class="nav-link nav-link-vita" id="nav-etl" href="/etl/">
                                    <i class="fa-solid fa-cloud-arrow-up me-2"></i> Cargar Dataset
                                </a>
                            </li>
                        </ul>
                    </div>

                    <div class="border-top pt-3 border-secondary">
                        <div class="px-2 mb-2 text-truncate" style="font-size: 0.85rem; color: rgba(255,255,255,0.6);" id="sidebar-user-email">
                            <i class="fa-solid fa-circle-notch fa-spin me-1"></i> Cargando...
                        </div>
                        <button class="btn btn-sm btn-outline-light w-100" id="btn-logout">
                            <i class="fa-solid fa-right-from-bracket me-2"></i> Salir
                        </button>
                    </div>
                </div>

                <div class="col-12 col-md-9 col-lg-10 p-4">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>

        <script>
            document.addEventListener("DOMContentLoaded", async function() {
                const token = localStorage.getItem('token_acceso');
                if (!token) return;

                try {
                    const response = await fetch('/api/etl/auth/me/', {
                        method: 'GET',
                        headers: { 'Authorization': `Bearer ${token}` }
                    });

                    if (response.ok) {
                        const userData = await response.json();

                        document.getElementById('sidebar-user-email').innerHTML = `<i class="fa-solid fa-user me-2" style="color: var(--clia-wisteria);"></i> ${userData.email}`;

                        if (userData.rol === 'ADMIN' || userData.rol === 'ANALISTA') {
                            document.getElementById('menu-cargar-dataset').classList.remove('d-none');
                        }
                    } else {
                        ejecutarLogout();
                    }
                } catch (error) {
                    console.error("Error validando sesión:", error);
                }

                document.getElementById('btn-logout').addEventListener('click', ejecutarLogout);
            });

            function ejecutarLogout() {
                localStorage.removeItem('token_acceso');
                localStorage.removeItem('token_refresco');
                window.location.href = '/login/';
            }
        </script>
    {% endif %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
