{% extends 'base.html' %}

{% block title %}Pacientes | VITA Clinical{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-4">
    <h2 class="fw-bold m-0" style="font-family: 'Epilogue'; color: var(--clia-jacarta);">
        Gestión y Segmentación de Pacientes
    </h2>
    <div class="btn-group shadow-sm" role="group">
        <button type="button" class="btn btn-outline-primary active" id="btn-filtro-todos">Todos</button>
        <button type="button" class="btn btn-outline-danger" id="btn-filtro-criticos">
            <i class="fa-solid fa-triangle-exclamation me-1"></i> Solo Críticos
        </button>
    </div>
</div>

<div class="card p-4 border-0 shadow-sm rounded-4 bg-white">
    <div class="table-responsive">
        <table class="table table-hover align-middle">
            <thead class="table-light">
                <tr>
                    <th>ID Paciente</th>
                    <th>Edad</th>
                    <th>Sexo</th>
                    <th>IMC</th>
                    <th>Signos Vitales (TA / Glucosa / Sat)</th>
                    <th>Estado / Riesgo</th>
                </tr>
            </thead>
            <tbody id="tabla-pacientes">
                <tr>
                    <td colspan="6" class="text-center py-4 text-muted">
                        <i class="fa-solid fa-circle-notch fa-spin me-2"></i> Cargando registros clínicos...
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    document.getElementById('nav-pacientes').classList.add('active');

    let todosLosPacientes = [];

    document.addEventListener("DOMContentLoaded", async function() {
        const token = localStorage.getItem('token_acceso');
        if (!token) return;

        try {
            const response = await fetch('/api/etl/pacientes/', {
                method: 'GET',
                headers: { 'Authorization': `Bearer ${token}` }
            });

            if (response.ok) {
                todosLosPacientes = await response.json();
                renderizarTabla(todosLosPacientes);
            } else {
                document.getElementById('tabla-pacientes').innerHTML = `
                    <tr><td colspan="6" class="text-center text-danger py-4">Error al cargar los datos.</td></tr>
                `;
            }
        } catch (error) {
            console.error("Error cargando pacientes:", error);
        }

        document.getElementById('btn-filtro-todos').addEventListener('click', function() {
            cambiarFiltroActivo('btn-filtro-todos', 'btn-filtro-criticos');
            renderizarTabla(todosLosPacientes);
        });

        document.getElementById('btn-filtro-criticos').addEventListener('click', function() {
            cambiarFiltroActivo('btn-filtro-criticos', 'btn-filtro-todos');
            const criticos = todosLosPacientes.filter(p => p.presion_sistolica > 180 || p.glucosa > 300 || p.saturacion_oxigeno < 85);
            renderizarTabla(criticos);
        });
    });

    function cambiarFiltroActivo(activoId, inactivoId) {
        document.getElementById(activoId).classList.add('active');
        document.getElementById(inactivoId).classList.remove('active');
    }

    function renderizarTabla(pacientes) {
        const tbody = document.getElementById('tabla-pacientes');
        if (pacientes.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="text-center py-4 text-muted">No se encontraron registros.</td></tr>`;
            return;
        }

        tbody.innerHTML = '';
        pacientes.forEach(p => {
            const esCritico = p.presion_sistolica > 180 || p.glucosa > 300 || p.saturacion_oxigeno < 85;

            const badgeEstado = esCritico
                ? `<span class="badge bg-danger bg-opacity-10 text-danger px-3 py-2 rounded-pill"><i class="fa-solid fa-circle-exclamation me-1"></i> Crítico</span>`
                : `<span class="badge bg-success bg-opacity-10 text-success px-3 py-2 rounded-pill">Estable</span>`;

            const filaClase = esCritico ? 'table-danger bg-opacity-10' : '';

            tbody.innerHTML += `
                <tr class="${filaClase}">
                    <td class="fw-semibold">#VITA-${p.id_paciente}</td>
                    <td>${p.edad} años</td>
                    <td><span class="text-capitalize">${p.sexo}</span></td>
                    <td>${p.imc}</td>
                    <td>
                        <small class="d-block">PA: <strong>${p.presion_sistolica} mmHg</strong></small>
                        <small class="d-block">Glucosa: <strong>${p.glucosa} mg/dL</strong></small>
                        <small class="d-block">SatO₂: <strong>${p.saturacion_oxigeno}%</strong></small>
                    </td>
                    <td>${badgeEstado}</td>
                </tr>
            `;
        });
    }
</script>
{% endblock %}
